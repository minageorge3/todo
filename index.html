  <body>
    <main class="app">
      <section class="greeting">
        <h2 class="title">
          Hello, <input type="text" id="name" placeholder="Your Name" />
        </h2>
      </section>

      <section class="create-todo">
        <div class="intro" id="intro">
          <h3 id="title">Create A ToDo</h3>
          <div class="mail" id="bigmail">
            <div id="mail"></div>
            <i id="mail-icon" class="fa-solid fa-user"></i>
          </div>
        </div>
        <form id="new-todo-form">
          <h4>Enter Your Task</h4>
          <input
            type="text"
            id="content"
            name="content"
            placeholder="Your Task Here..."
          />
          <p class="copy">Design by Mina Said George &copy;</p>
          <h4>pick a category</h4>
          <div class="options">
            <label>
              <input
                type="radio"
                name="category"
                id="category1"
                value="normal"
              />
              <span class="bubble normal"></span>
              <div>Normal</div>
            </label>
            <label>
              <input
                type="radio"
                name="category"
                id="category2"
                value="important"
              />
              <span class="bubble important"></span>
              <div>Important</div>
            </label>
          </div>
          <input type="submit" value="Add Task" />
        </form>
      </section>
      <section class="todo-list">
        <h3>To-Do List</h3>
